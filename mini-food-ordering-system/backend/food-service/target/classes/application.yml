server:
  port: 8082
spring:
  application:
    name: food-service
  datasource:
    url: jdbc:h2:mem:fooddb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
logging:
  level:
    root: INFO
    com.example.foodservice: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: "*"

