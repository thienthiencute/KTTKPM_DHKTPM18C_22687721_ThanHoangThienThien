server:
  port: 8083
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
service:
  user: http://localhost:8081/api/users
  food: http://localhost:8082/api/foods
logging:
  level:
    com.example.orderservice: DEBUG

